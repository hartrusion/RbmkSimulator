name: Java Ant Snapshot build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - '**/*.yml'
      - '**/*.png'
      - '**/*.svg'
      - '**/*.xml'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  TARGET_REPO: ${{ github.repository }}
  NIGHTLY_TAG: "github-ci-snapshot"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REPOS: "hartrusion/utils,hartrusion/PhxNetMod,hartrusion/PhxNetModExt,hartrusion/JMPLot"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 50

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare lib directory
        run: mkdir -p lib

      - name: Download jars from multiple repositories SNAPSHOT releases
        env:
          TOKEN: ${{ github.token }}
          REPOS: ${{ env.REPOS }}
          TAG: ${{ env.NIGHTLY_TAG }}
        run: |
          set -euo pipefail
          echo "Repos to process: $REPOS"
          IFS=',' read -r -a REPO_ARR <<< "$REPOS"
          mkdir -p lib

          for repo in "${REPO_ARR[@]}"; do
            repo=$(echo "$repo" | xargs)
            [ -n "$repo" ] || continue
            echo "==> Processing repository: $repo"

            API="https://api.github.com/repos/${repo}/releases/tags/${TAG}"
            rel_json=$(curl -sS -H "Authorization: token ${TOKEN}" -H "Accept: application/vnd.github+json" "$API" || true)

            rel_id=$(printf '%s' "$rel_json" | jq -r '.id // empty')
            if [ -z "$rel_id" ]; then
              echo "  No release with tag '${TAG}' found in ${repo}, skipping."
              continue
            fi

            mapfile -t urls < <(printf '%s' "$rel_json" | jq -r '.assets[]?.browser_download_url // empty')
            if [ "${#urls[@]}" -eq 0 ]; then
              echo "  Release '${TAG}' has no assets in ${repo}, skipping."
              continue
            fi

            for url in "${urls[@]}"; do
              [ -n "$url" ] || continue
              asset_name=$(basename "${url%%\?*}")

              case "$asset_name" in
                *.jar)
                  curl -fSL -H "Authorization: token ${TOKEN}" -o "lib/${asset_name}" "$url"
                  ;;
                *.zip)
                  tmpzip="$(mktemp -u)/${asset_name}"
                  mkdir -p "$(dirname "$tmpzip")"
                  curl -fSL -H "Authorization: token ${TOKEN}" -o "$tmpzip" "$url"
                  tmpdir=$(mktemp -d)
                  unzip -q "$tmpzip" -d "$tmpdir" || (echo "unzip failed for $asset_name"; rm -rf "$tmpdir" "$tmpzip"; continue)

                  while IFS= read -r -d '' jar; do
                    bn=$(basename "$jar")
                    cp -f "$jar" "lib/${bn}"
                  done < <(find "$tmpdir" -type f -name '*.jar' -print0)

                  rm -rf "$tmpdir" "$tmpzip"
                  ;;
              esac
            done
          done

      - name: Download AbsoluteLayout from Maven Central
        run: |
          set -euo pipefail
          mkdir -p lib
          METADATA_URL="https://repo1.maven.org/maven2/org/netbeans/external/AbsoluteLayout/maven-metadata.xml"
          meta=$(curl -sSL "$METADATA_URL")
          VERSION=$(printf '%s' "$meta" | sed -n 's:.*<release>\(.*\)</release>.*:\1:p' || true)
          if [ -z "$VERSION" ]; then
            VERSION=$(printf '%s' "$meta" | sed -n 's:.*<latest>\(.*\)</latest>.*:\1:p' || true)
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(printf '%s' "$meta" | sed -n 's:.*<version>\(.*\)</version>.*:\1:p' | tail -n1 || true)
          fi
          JAR_URL="https://repo1.maven.org/maven2/org/netbeans/external/AbsoluteLayout/${VERSION}/AbsoluteLayout-${VERSION}.jar"
          curl -fSL -o "lib/AbsoluteLayout-${VERSION}.jar" "$JAR_URL"

      - name: Run Ant build
        run: ant -buildfile .github/build.xml fatjar

      - name: Build snapshot changelog
        run: |
          {
            echo "## Changes"
            echo
            git log -10 --pretty=format:"- %s (%h)"
            echo
          } > SNAPSHOT_NOTES.md

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v5
        with:
          name: Package
          path: build/jar/*.jar

      - name: Upload snapshot notes artifact
        uses: actions/upload-artifact@v5
        with:
          name: SnapshotNotes
          path: SNAPSHOT_NOTES.md

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download "Package" artifact from build job
        uses: actions/download-artifact@v5
        with:
          name: Package
          path: artifacts

      - name: Download snapshot notes
        uses: actions/download-artifact@v5
        with:
          name: SnapshotNotes
          path: artifacts

      - name: Delete existing release and tag if present
        env:
          API_URL: "https://api.github.com/repos/${{ env.TARGET_REPO }}"
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.NIGHTLY_TAG }}
        run: |
          set -euo pipefail
          release_resp=$(curl -sS -H "Authorization: token $TOKEN" -H "Accept: application/vnd.github+json" "$API_URL/releases/tags/$TAG" || true)
          release_id=$(printf '%s' "$release_resp" | jq -r '.id // empty')

          if [ -n "$release_id" ]; then
            curl -s -o /dev/null -w "%{http_code}" -X DELETE -H "Authorization: token $TOKEN" -H "Accept: application/vnd.github+json" "$API_URL/releases/$release_id" || true
          fi

          ref_status=$(curl -sS -H "Authorization: token $TOKEN" -H "Accept: application/vnd.github+json" -o /dev/null -w "%{http_code}" "$API_URL/git/ref/tags/$TAG" || true)
          if [ "$ref_status" -ge 200 ] && [ "$ref_status" -lt 300 ]; then
            curl -s -o /dev/null -w "%{http_code}" -X DELETE -H "Authorization: token $TOKEN" -H "Accept: application/vnd.github+json" "$API_URL/git/refs/tags/$TAG" || true
          fi

      - name: Create tag on main branch
        env:
          API_URL: "https://api.github.com/repos/${{ env.TARGET_REPO }}"
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.NIGHTLY_TAG }}
        run: |
          set -euo pipefail
          sha_resp=$(curl -sS -H "Authorization: token $TOKEN" -H "Accept: application/vnd.github+json" "$API_URL/git/ref/heads/main")
          commit_sha=$(printf '%s' "$sha_resp" | jq -r '.object.sha // empty')
          create_resp=$(curl -sS -X POST -H "Authorization: token $TOKEN" -H "Accept: application/vnd.github+json" \
            -d "{\"ref\":\"refs/tags/$TAG\",\"sha\":\"$commit_sha\"}" \
            "$API_URL/git/refs")
          tag_ref=$(printf '%s' "$create_resp" | jq -r '.ref // empty')
          if [ -z "$tag_ref" ]; then
            printf '%s\n' "$create_resp"
            exit 1
          fi

      - name: Create release (github-ci-snapshot)
        id: create_release
        env:
          API_URL: "https://api.github.com/repos/${{ env.TARGET_REPO }}"
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.NIGHTLY_TAG }}
        run: |
          set -euo pipefail
          body=$(python3 - <<'PY'
from pathlib import Path
print(Path("artifacts/SNAPSHOT_NOTES.md").read_text())
PY
)
          create_resp=$(curl -sS -X POST -H "Authorization: token $TOKEN" -H "Accept: application/vnd.github+json" \
            -d "$(jq -n --arg tag "$TAG" --arg name "$TAG" --arg body "$body" '{tag_name:$tag,name:$name,body:$body,draft:false,prerelease:true}')" \
            "$API_URL/releases")
          upload_url=$(printf '%s' "$create_resp" | jq -r '.upload_url // empty')
          release_id=$(printf '%s' "$create_resp" | jq -r '.id // empty')
          if [ -z "$upload_url" ] || [ -z "$release_id" ]; then
            printf '%s\n' "$create_resp"
            exit 1
          fi
          upload_url="${upload_url%\{*}"
          echo "upload_url=$upload_url" >> $GITHUB_OUTPUT

      - name: Upload all jar assets
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
        run: |
          set -euo pipefail
          found_any=false
          while IFS= read -r -d '' jarfile; do
            found_any=true
            filename=$(basename "$jarfile")
            echo "Uploading $filename"
            http_status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/java-archive" \
              --data-binary @"$jarfile" \
              "$UPLOAD_URL?name=$filename")
            if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
              echo "Upload failed for $filename with status $http_status"
              exit 1
            fi
          done < <(find artifacts -type f -name '*.jar' -print0)

          if [ "$found_any" = false ]; then
            echo "No jar files found in artifacts/"
            exit 1
          fi

      - name: Clean tmp
        run: rm -rf artifacts || true

  probe-artifacts:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      has_artifacts: ${{ steps.check.outputs.has_artifacts }}
    steps:
      - name: Check for artifacts named "Package"
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: https://api.github.com/repos/${{ github.repository }}
          ARTIFACT_NAME: Package
        run: |
          set -euo pipefail
          resp=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API_URL/actions/artifacts?per_page=100")
          count=$(echo "$resp" | jq -r '.artifacts[] | select(.name == env.ARTIFACT_NAME) | .id' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "has_artifacts=true" >> $GITHUB_OUTPUT
          else
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
          fi

  cleanup:
    needs: probe-artifacts
    if: needs.probe-artifacts.outputs.has_artifacts == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Delete older 'Package' artifacts (keep only the newest)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: https://api.github.com/repos/${{ github.repository }}
          ARTIFACT_NAME: Package
        run: |
          set -euo pipefail
          resp=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API_URL/actions/artifacts?per_page=100")
          artifacts=$(echo "$resp" | jq -r '.artifacts[] | select(.name == env.ARTIFACT_NAME) | "\(.created_at) \(.id)"' | sort -r)
          ids_to_delete=$(echo "$artifacts" | tail -n +2 | awk '{print $2}')
          if [ -z "$ids_to_delete" ]; then
            exit 0
          fi
          for id in $ids_to_delete; do
            http_status=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE -H "Authorization: token $GITHUB_TOKEN" "$API_URL/actions/artifacts/$id")
            if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
              exit 1
            fi
          done
