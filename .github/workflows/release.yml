name: Create Release with Windows Standalone

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag name (like v0.1.2)'
        required: true
        type: string

permissions:
  contents: write
  packages: read

jobs:
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure Maven settings for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github-utils</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
              <server>
                <id>github-phxnetmod</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
              <server>
                <id>github-phxnetmodext</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
              <server>
                <id>github-jmplot</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Resolve dependencies via Maven into lib/
        run: |
          cp .github/pom.xml pom.xml
          mkdir -p lib
          mvn -B dependency:copy-dependencies \
            -DoutputDirectory=lib \
            -DincludeScope=compile
          rm -f pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Ant build
        run: ant -buildfile .github/build.xml fatjar

      - name: Build release changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(curl -sS \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.tag_name // empty')

          {
            echo "## Changes"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)"
            else
              git log -20 --pretty=format:"- %s (%h)"
            fi
            echo
          } > RELEASE_NOTES.md

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-jar
          path: build/jar/*.jar

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build-windows-exe:
    needs: build-jar
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: compiled-jar
          path: artifact-jar

      - name: Create Windows App Images (jpackage)
        shell: pwsh
        run: |
          $simJar = "artifact-jar\RbmkSimulator.jar"
          $clientJar = "artifact-jar\RbmkSimulatorClient.jar"

          if (-not (Test-Path $simJar)) {
            Write-Error "Missing simulator jar: $simJar"
            exit 1
          }

          if (-not (Test-Path $clientJar)) {
            Write-Error "Missing client jar: $clientJar"
            exit 1
          }

          jpackage --type app-image `
                   --name RbmkSimulator `
                   --input artifact-jar `
                   --main-jar RbmkSimulator.jar `
                   --dest build-win

          jpackage --type app-image `
                   --name RbmkSimulatorClient `
                   --input artifact-jar `
                   --main-jar RbmkSimulatorClient.jar `
                   --dest build-win

      - name: Merge client launcher into simulator package
        shell: pwsh
        run: |
          $simRoot = "build-win\RbmkSimulator"
          $clientRoot = "build-win\RbmkSimulatorClient"

          if (-not (Test-Path $simRoot)) {
            Write-Error "Simulator app image not found: $simRoot"
            exit 1
          }

          if (-not (Test-Path $clientRoot)) {
            Write-Error "Client app image not found: $clientRoot"
            exit 1
          }

          $clientExe = Join-Path $clientRoot "RbmkSimulatorClient.exe"
          $clientCfg = Join-Path $clientRoot "app\RbmkSimulatorClient.cfg"
          $clientJPackageXml = Join-Path $clientRoot "app\.jpackage.xml"

          if (-not (Test-Path $clientExe)) {
            Write-Error "Missing client exe: $clientExe"
            exit 1
          }

          if (-not (Test-Path $clientCfg)) {
            Write-Error "Missing client config: $clientCfg"
            exit 1
          }

          if (-not (Test-Path $clientJPackageXml)) {
            Write-Error "Missing client .jpackage.xml: $clientJPackageXml"
            exit 1
          }

          Copy-Item $clientExe (Join-Path $simRoot "RbmkSimulatorClient.exe") -Force
          Copy-Item $clientCfg (Join-Path $simRoot "app\RbmkSimulatorClient.cfg") -Force
          Copy-Item $clientJPackageXml (Join-Path $simRoot "app\.jpackageClient.xml") -Force

      - name: Create ZIP from merged Windows App Image
        shell: pwsh
        run: |
          Compress-Archive -Path "build-win\RbmkSimulator\*" -DestinationPath "RbmkSimulator-Windows-x64.zip"

      - name: Upload Windows ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: RbmkSimulator-Windows-x64.zip

  create-release:
    needs: [build-jar, build-windows-exe]
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-jar
          path: release-assets/

      - name: Download Windows ZIP Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: release-assets/

      - name: Download release notes artifact
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Release ${{ github.event.inputs.tag_name }}
          body_path: release-assets/RELEASE_NOTES.md
          files: |
            release-assets/*.jar
            release-assets/RbmkSimulator-Windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
