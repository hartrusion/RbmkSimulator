name: Create Release with Windows Standalone

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag name (like v0.1.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-jar:
    runs-on: ubuntu-latest
    env:
      REPOS: "hartrusion/utils,hartrusion/PhxNetMod,hartrusion/PhxNetModExt,hartrusion/JMPLot"
      NIGHTLY_TAG: "github-ci-snapshot"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 50

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download dependencies (Jars and ZIPs)
        env:
          TOKEN: ${{ github.token }}
          REPOS: ${{ env.REPOS }}
          TAG: ${{ env.NIGHTLY_TAG }}
        run: |
          set -euo pipefail
          IFS=',' read -r -a REPO_ARR <<< "$REPOS"
          mkdir -p lib

          for repo in "${REPO_ARR[@]}"; do
            repo=$(echo "$repo" | xargs)
            [ -n "$repo" ] || continue

            API="https://api.github.com/repos/${repo}/releases/tags/${TAG}"
            rel_json=$(curl -sS -H "Authorization: token ${TOKEN}" "$API" || true)

            mapfile -t urls < <(printf '%s' "$rel_json" | jq -r '.assets[]?.browser_download_url // empty')
            for url in "${urls[@]}"; do
              [ -n "$url" ] || continue
              asset_name=$(basename "${url%%\?*}")

              case "$asset_name" in
                *.jar)
                  curl -fSL -H "Authorization: token ${TOKEN}" -o "lib/${asset_name}" "$url"
                  ;;
                *.zip)
                  tmpzip="$(mktemp -u)/${asset_name}"
                  mkdir -p "$(dirname "$tmpzip")"
                  curl -fSL -H "Authorization: token ${TOKEN}" -o "$tmpzip" "$url"
                  tmpdir=$(mktemp -d)
                  unzip -q "$tmpzip" -d "$tmpdir" || true
                  find "$tmpdir" -type f -name '*.jar' -exec cp -f {} lib/ \;
                  rm -rf "$tmpdir" "$tmpzip"
                  ;;
              esac
            done
          done

      - name: Download AbsoluteLayout
        run: |
          mkdir -p lib
          METADATA_URL="https://repo1.maven.org/maven2/org/netbeans/external/AbsoluteLayout/maven-metadata.xml"
          meta=$(curl -sSL "$METADATA_URL")
          VERSION=$(printf '%s' "$meta" | sed -n 's:.*<version>\(.*\)</version>.*:\1:p' | tail -n1 || true)
          JAR_URL="https://repo1.maven.org/maven2/org/netbeans/external/AbsoluteLayout/${VERSION}/AbsoluteLayout-${VERSION}.jar"
          curl -fSL -o "lib/AbsoluteLayout-${VERSION}.jar" "$JAR_URL"

      - name: Run Ant build
        run: ant -buildfile .github/build.xml fatjar

      - name: Build release changelog
        run: |
          {
            echo "## Changes"
            echo
            git log -10 --pretty=format:"- %s (%h)"
            echo
          } > RELEASE_NOTES.md

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-jar
          path: build/jar/*.jar

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build-windows-exe:
    needs: build-jar
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: compiled-jar
          path: artifact-jar

      - name: Create Windows App Images (jpackage)
        shell: pwsh
        run: |
          $simJar = "artifact-jar\RbmkSimulator-SNAPSHOT.jar"
          $clientJar = "artifact-jar\RbmkSimulatorClient-SNAPSHOT.jar"

          if (-not (Test-Path $simJar)) {
            Write-Error "Missing simulator jar: $simJar"
            exit 1
          }

          if (-not (Test-Path $clientJar)) {
            Write-Error "Missing client jar: $clientJar"
            exit 1
          }

          jpackage --type app-image `
                   --name RbmkSimulator `
                   --input artifact-jar `
                   --main-jar RbmkSimulator-SNAPSHOT.jar `
                   --dest build-win

          jpackage --type app-image `
                   --name RbmkSimulatorClient `
                   --input artifact-jar `
                   --main-jar RbmkSimulatorClient-SNAPSHOT.jar `
                   --dest build-win

      - name: Merge client launcher into simulator package
        shell: pwsh
        run: |
          $simRoot = "build-win\RbmkSimulator"
          $clientRoot = "build-win\RbmkSimulatorClient"

          if (-not (Test-Path $simRoot)) {
            Write-Error "Simulator app image not found: $simRoot"
            exit 1
          }

          if (-not (Test-Path $clientRoot)) {
            Write-Error "Client app image not found: $clientRoot"
            exit 1
          }

          $clientExe = Join-Path $clientRoot "RbmkSimulatorClient.exe"
          $clientCfg = Join-Path $clientRoot "app\RbmkSimulatorClient.cfg"
          $clientJPackageXml = Join-Path $clientRoot "app\.jpackage.xml"

          if (-not (Test-Path $clientExe)) {
            Write-Error "Missing client exe: $clientExe"
            exit 1
          }

          if (-not (Test-Path $clientCfg)) {
            Write-Error "Missing client config: $clientCfg"
            exit 1
          }

          if (-not (Test-Path $clientJPackageXml)) {
            Write-Error "Missing client .jpackage.xml: $clientJPackageXml"
            exit 1
          }

          Copy-Item $clientExe (Join-Path $simRoot "RbmkSimulatorClient.exe") -Force
          Copy-Item $clientCfg (Join-Path $simRoot "app\RbmkSimulatorClient.cfg") -Force
          Copy-Item $clientJPackageXml (Join-Path $simRoot "app\.jpackageClient.xml") -Force

      - name: Create ZIP from merged Windows App Image
        shell: pwsh
        run: |
          Compress-Archive -Path "build-win\RbmkSimulator\*" -DestinationPath "RbmkSimulator-Windows-x64.zip"

      - name: Upload Windows ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: RbmkSimulator-Windows-x64.zip

  create-release:
    needs: [build-jar, build-windows-exe]
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-jar
          path: release-assets/

      - name: Download Windows ZIP Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: release-assets/

      - name: Download release notes artifact
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Release ${{ github.event.inputs.tag_name }}
          body_path: release-assets/RELEASE_NOTES.md
          files: |
            release-assets/*.jar
            release-assets/RbmkSimulator-Windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
